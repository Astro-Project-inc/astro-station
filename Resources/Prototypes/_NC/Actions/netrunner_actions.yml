- type: entity
  parent: BaseAction
  id: ActionNetrunnerReturn
  name: "Jack Out"
  description: "Emergency disconnect from the Net."
  components:
  - type: Action
    useDelay: 1.0
    icon: 
      sprite: Interface/Actions/actions_ai.rsi
      state: manifest
  - type: InstantAction
    event: !type:ReturnToBodyEvent
    
- type: entity
  id: ActionNetrunnerShock
  parent: BaseAction
  name: Short Circuit
  description: Перегружает нейросети цели мощным разрядом.
  components:
  - type: Action
    useDelay: 10.0
    icon: 
      sprite: Interface/Actions/actions_ai.rsi
      state: manifest
  - type: EntityTargetAction
    event: !type:NetrunnerShockEvent
    checkCanAccess: false # Бьем сквозь стены
    range: 15
    itemIconStyle: NoItem
  - type: TargetAction
  
- type: entity
  id: ActionNetrunnerIgnite
  parent: BaseAction
  name: Overheat
  description: Отключает кулеры кибернетики цели, вызывая возгорание.
  components:
  - type: Action
    useDelay: 15.0
    icon: 
      sprite: Interface/Actions/actions_ai.rsi
      state: manifest
      color: "#FF4400" # Подкрасим иконку в рыжий
  - type: EntityTargetAction
    event: !type:NetrunnerIgniteEvent
    checkCanAccess: false # Сквозь стены
    range: 15
    itemIconStyle: NoItem
  - type: TargetAction
- type: entity
  parent: BaseAction
  id: ActionNetrunnerReturn
  name: Отключиться
  description: Покунуть сеть и вернуться в тело.
  components:
  - type: Action
    useDelay: 1.0
    icon: 
      sprite: Interface/Actions/actions_ai.rsi
      state: manifest
  - type: InstantAction
    event: !type:ReturnToBodyEvent
    
- type: entity
  id: ActionNetrunnerShock
  parent: BaseAction
  name: Короткое замыкание
  description: Вызывает мощный электрический разряд в кибернетике цели, нанося урон и оглушая её.
  components:
  - type: Action
    useDelay: 60.0
    icon: 
      sprite: Interface/Actions/actions_ai.rsi
      state: manifest
  - type: EntityTargetAction
    event: !type:NetrunnerShockEvent
    checkCanAccess: false # Бьем сквозь стены
    range: 15
  - type: TargetAction
  
- type: entity
  id: ActionNetrunnerIgnite
  parent: BaseAction
  name: Перегрев
  description: Вызывает перегрев кибернетики цели, поджигая её.
  components:
  - type: Action
    useDelay: 120.0
    icon: 
      sprite: Interface/Actions/actions_ai.rsi
      state: manifest
  - type: EntityTargetAction
    event: !type:NetrunnerIgniteEvent
    checkCanAccess: false # Сквозь стены
    range: 15
  - type: TargetAction

- type: entity
  id: ActionNetrunnerDoorToggle
  parent: BaseAction
  name: Взлом двери
  description: Принудительно меняет состояние двери (Открыть/Закрыть), игнорируя доступы.
  components:
  - type: Action
    useDelay: 5.0
    icon: 
      sprite: Interface/Actions/actions_ai.rsi
      state: manifest
      color: "#00DDFF" # Голубой цвет (как у хакеров)
  - type: EntityTargetAction
    event: !type:NetrunnerDoorToggleEvent
    checkCanAccess: false 
    range: 15
    itemIconStyle: BigAction
  - type: TargetAction
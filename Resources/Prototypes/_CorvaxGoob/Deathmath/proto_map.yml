- type: gameMap
  id: Box_CS
  mapName: 'Box Station'
  mapPath: /Maps/_Goobstation/box.yml # Goobstation
  minPlayers: 0
  maxPlayers: 85
  stations:
    Boxstation:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Box Station {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'TG'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_box.yml
        - type: StationJobs
          availableJobs:
            Passenger: [ -1, -1 ]

#для респавнов нужно использовать SpawnPointPassenger

- type: gamePreset
  id: Deathmatch_CorvaxStabion
  alias:
    - deathmatch_CorvaxStabion
    - dmCS
  name: death-match-title
  description: Вы хотели зайти в CS но попали в CorvaxStation.
  maxPlayers: 100
  minPlayers: 0
  showInVote: false
  supportedMaps: DeathMatchMapPool_CS
  rules:
    - DeathMatch_CS

- type: entity
  id: DeathMatch_CS
  parent: BaseGameRule
  components:
  - type: DeathMatchRule # логика режима Content.Server.GameTicking.Rules
    gear: DeathMatchGear_CS
    killCap: 30 # сколько нужно убийств для победы
    #restartDelay: 10 по умолчанию, как я понял
    #CorvaxGoob: True потом
    rewardSpawns: #Сущность, появляющаяся после убийства игрока.
    - id: Telecrystal
#    - id: HealingToolbox
#    - id: ClothingOuterArmorBasicSlim
#      orGroup: loot
#    - id: ClothingHeadHelmetBasic
#      orGroup: loot
#    - id: SoapNT
#      orGroup: loot
#    - id: Bola
#      orGroup: loot
#    - id: Spear
#      orGroup: loot
#    - id: ClothingShoesGaloshes
#      orGroup: loot
#    - id: FoodPieBananaCream
#      orGroup: loot
#    - id: Stimpack
#      orGroup: loot
  - type: KillCalloutRule # Это обрабатывает вызов убийств из KillTrackingSystem
  - type: PointManager #  сохраняет очки для всех игроков
  - type: RespawnDeadRule # ну вы пон
  - type: RespawnTracker # для глобального отслеживания игроков, которых необходимо возродить
    respawnDelay: 5

